version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  ml_service:
    build: ./ml_service
    ports:
      - "9000:9000"
    restart: unless-stopped

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/phishing_db
      - PORT=5000
      - ML_SERVICE_URL=http://ml_service:9000
    depends_on:
      - mongo
      - ml_service
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
